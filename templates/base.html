<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link rel="stylesheet" href = "{{ url_for('static', filename = 'css/index.css')}}">
    <script src = "{{url_for('static',filename = 'javascript/index.js')}}"></script>
</head>
<body style="margin: 0; display: flex; flex-direction: column; min-height: 100vh; background-color: rgb(230, 227, 227);">
    <nav>
            <h1> B.L.O.G.S </h1>
            <ul>
                <a href = "{{url_for('home')}}"><li>Home</li></a>
                <a href = "{{url_for('blogs')}}"><li>Blogs</li></a>
                {% if current_user.is_authenticated %}
            <a href = "/logout">
                <button>logout</button>
            </a>
            </ul>
            {% else %}
                <a href = "{{url_for('register')}}" class = "navitems"><li>
                    <button class = "Loginbtn">Login</button>
                </li></a>
                
            </ul>
            {% endif %}
    </nav>


<div style="flex: 1;">
    {% block content %}
    {% endblock %}
</div>
<footer >
    <p>&copy; 2026 Another one. All rights reserved</p>
</footer>

</body>
</html>
