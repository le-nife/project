{%extends 'base.html'%}
{% block content%}
<form method="post" enctype="multipart/form-data">
    <input type="text" name="Blog_title" value = "{{blog.title}}" placeholder="Blog Name" required style="margin-top: 40px;"><br>
    <input type="text" name="Blog_author"  value = "{{blog.author}}" placeholder="Author" required style="margin-top: 40px;"><br>
    <textarea name="Blog_content"  placeholder="Content" style="margin-top: 40px;">{{blog.content}}</textarea><br>
    <input type="file" name ="Blog_image"/>
    <img src="{{ url_for('static', filename='uploads/' + blog.image) }}" style="width:100px; height: 50px; border-radius: 5px;">
    <button type="submit" style = "width: 100px; height: 25px;">Update</button>
    </form>
{%endblock%}
